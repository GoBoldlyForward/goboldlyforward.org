<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  {%- include head.html -%}
</head>
<body>
  {%- include navbar.html -%}

  {{ content }}

  {%- include footer.html -%}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Apply form: clear inline validation + Formspree AJAX (stays on-page, shows our message).
    (function () {
      var gf = document.getElementById('grantForm');
      if (!gf) return;
      var ok = document.getElementById('formSuccess');
      var err = document.getElementById('formError');
      var btn = gf.querySelector('button[type="submit"]');
      function fields() { return gf.querySelectorAll('input:not([type=hidden]), select, textarea'); }
      function fail(msg) {
        if (!err) return;
        err.textContent = msg + ' You can also email morgan@goboldlyforward.com.';
        err.classList.remove('d-none');
        err.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      // Clear a field's error the moment it becomes valid.
      function clear(e) {
        var t = e.target;
        if (t.classList && t.classList.contains('is-invalid') && t.checkValidity()) t.classList.remove('is-invalid');
      }
      gf.addEventListener('input', clear);
      gf.addEventListener('change', clear);

      gf.addEventListener('submit', function (e) {
        e.preventDefault();
        if (err) err.classList.add('d-none');
        if (!gf.checkValidity()) {
          var first = null;
          fields().forEach(function (c) {
            if (c.checkValidity()) { c.classList.remove('is-invalid'); }
            else { c.classList.add('is-invalid'); if (!first) first = c; }
          });
          if (first) { first.focus({ preventScroll: true }); first.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
          return;
        }
        var label = btn ? btn.textContent : '';
        if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }
        fetch(gf.action, {
          method: 'POST',
          body: new FormData(gf),
          headers: { 'Accept': 'application/json' }
        }).then(function (res) {
          if (res.ok) {
            gf.reset();
            fields().forEach(function (c) { c.classList.remove('is-invalid'); });
            if (ok) { ok.classList.remove('d-none'); ok.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
          } else {
            return res.json().then(function (d) {
              throw new Error(d && d.errors ? d.errors.map(function (x) { return x.message; }).join(' ') : 'Submission failed.');
            });
          }
        }).catch(function (e2) {
          fail(e2 && e2.message ? e2.message : 'Something went wrong.');
        }).finally(function () {
          if (btn) { btn.disabled = false; btn.textContent = label; }
        });
      });
    })();
  </script>
</body>
</html>
